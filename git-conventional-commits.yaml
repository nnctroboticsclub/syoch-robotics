---
convention:
  commitTypes:
  - Feat
  - Fix
  - Refactor
  - Perf
  - Style
  - Test
  - Docs
  - Build
  - CI
  - Chore
  - Update
  - merge
  commitScopes: []
  releaseTagGlobPattern: v[0-9]*.[0-9]*.[0-9]*
changelog:
  commitTypes:
  - Feat
  - Fix
  - Perf
  includeInvalidCommits: true
  commitIgnoreRegexPattern: "^WIP "
  headlines:
    feat: Features
    fix: Bug Fixes
    perf: Performance Improvements
    merge: Merges
    breakingChange: BREAKING CHANGES
  commitUrl: https://github.com/nnctroboticsclub/syoch-robotics/commit/%commit%
  commitRangeUrl: https://github.com/nnctroboticsclub/syoch-robotics/compare/%from%...%to%?diff=split
  issueRegexPattern: "#\\d+"
  issueUrl: https://github.com/nnctroboticsclub/syoch-robotics/issues/%issue%